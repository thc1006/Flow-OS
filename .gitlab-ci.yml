image: node:20

stages:
  - install
  - test
  - build
  - review
  - deploy

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

install_dependencies:
  stage: install
  timeout: 10m
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint_and_unit_tests:
  stage: test
  timeout: 10m
  needs: [install_dependencies]
  script:
    - npm run lint
    - npm run type-check
    - npm run test -- --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

build_app:
  stage: build
  timeout: 10m
  needs: [install_dependencies]
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

e2e_and_a11y:
  stage: review
  timeout: 20m
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  needs: [install_dependencies, build_app]
  script:
    - npx playwright install --with-deps chromium
    - npm run test:e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
    expire_in: 1 week

pages:
  stage: deploy
  timeout: 5m
  needs:
    - job: build_app
    - job: lint_and_unit_tests
    - job: e2e_and_a11y
  script:
    - rm -rf public-pages
    - mkdir -p public-pages
    - cp -r dist/. public-pages/
    - rm -rf public
    - mv public-pages public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

deploy_staging:
  stage: deploy
  timeout: 5m
  needs: [build_app, lint_and_unit_tests]
  script:
    - mkdir -p public-staging
    - cp -r dist/. public-staging/
  artifacts:
    paths:
      - public-staging
  rules:
    - if: $CI_COMMIT_REF_NAME == "develop"
  environment:
    name: staging
    url: https://staging.flow-os.example.com
