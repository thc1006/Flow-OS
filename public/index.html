    <style>
        /* === 基礎設定 === */
        html, body { height: 100%; overflow-x: hidden; }
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            color: #e2e8f0;
        }
        main { flex-grow: 1; overflow-y: auto; padding: 0 1rem; }

        /* === 植物動畫 === */
        #plant-svg { transform-origin: bottom center; transition: transform 0.5s ease-in-out, filter 0.3s ease; }
        .plant-grow { animation: grow 0.5s ease-in-out forwards; }
        @keyframes grow { from { transform: scale(1); } to { transform: scale(1.05); } }
        .plant-wilt { animation: wilt 0.5s ease-in-out; }
        @keyframes wilt { 50% { filter: saturate(0.3) contrast(0.7); transform: rotate(-2deg) scale(0.98); } }
        .plant-paused { filter: grayscale(50%); }

        /* === 玻璃擬態卡片 === */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .glass-card:hover {
            border-color: rgba(52, 211, 153, 0.3);
            box-shadow: 0 8px 32px rgba(52, 211, 153, 0.1);
        }

        /* === 按鈕樣式 === */
        .btn-primary {
            @apply text-white font-bold py-4 px-8 rounded-full shadow-lg transform transition-all duration-300 flex items-center justify-center;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.5);
        }
        .btn-primary:active { @apply scale-95; }

        .btn-secondary {
            @apply text-white font-bold py-2 px-4 rounded-full shadow-md transform transition-all duration-300 flex items-center justify-center;
            background: rgba(71, 85, 105, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(100, 116, 139, 0.9);
            transform: translateY(-1px);
        }
        .btn-secondary:active { @apply scale-95; }
        .btn-danger {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%) !important;
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* === Modal 遮罩 === */
        .modal-overlay { @apply fixed inset-0 flex items-center justify-center transition-opacity duration-300 z-50; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }

        /* === 底部導航列 === */
        nav.bottom-nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }
        .nav-item {
            @apply flex-1 text-center py-3 px-1 text-slate-400 rounded-2xl transition-all duration-300 flex flex-col items-center justify-center mx-1;
        }
        .nav-item:hover { color: #94a3b8; }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(5, 150, 105, 0.1) 100%);
            color: #34d399;
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.2);
        }
        .nav-icon { @apply h-6 w-6 mb-1; }

        /* === 成就徽章 === */
        .achievement-badge {
            @apply p-5 rounded-xl flex flex-col items-center justify-center text-center transition-all duration-500;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            min-height: 140px;
        }
        .achievement-badge.unlocked {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3) 0%, rgba(5, 150, 105, 0.2) 100%);
            border: 1px solid rgba(52, 211, 153, 0.4);
            box-shadow: 0 0 30px rgba(52, 211, 153, 0.2), inset 0 0 20px rgba(52, 211, 153, 0.1);
        }
        .achievement-badge.unlocked:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 40px rgba(52, 211, 153, 0.3);
        }
        .achievement-icon { @apply text-5xl mb-3; }
        .achievement-badge.locked {
            opacity: 0.5;
            filter: grayscale(80%);
            border-style: dashed;
        }
        .achievement-badge.locked .achievement-icon {
            filter: blur(2px);
        }

        /* === Toast 通知 === */
        #toast-notification {
            @apply fixed top-5 left-1/2 -translate-x-1/2 text-white py-3 px-6 rounded-full shadow-2xl z-50;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
            @apply transform transition-all duration-500 ease-in-out;
            opacity: 0; visibility: hidden; transform: translate(-50%, -20px);
        }
        #toast-notification.show { opacity: 1; visibility: visible; transform: translate(-50%, 0); }

        /* === 任務項目 === */
        .task-item {
            @apply p-4 rounded-xl flex items-center justify-between transition-all duration-300 cursor-pointer;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .task-item:hover {
            background: rgba(51, 65, 85, 0.7);
            border-color: rgba(52, 211, 153, 0.3);
            transform: translateX(4px);
        }
        .task-pomodoro-display { @apply text-sm text-slate-400; }
        .task-pomodoro-display .actual { @apply text-amber-400; }
        .task-pomodoro-display .estimated { @apply text-slate-500; }

        .task-selection-item {
            @apply w-full text-left p-4 rounded-xl transition-all duration-200;
            background: rgba(51, 65, 85, 0.3);
        }
        .task-selection-item:hover {
            background: rgba(51, 65, 85, 0.6);
            transform: translateX(4px);
        }

        /* === 表單元素 === */
        .form-input {
            @apply w-full px-4 py-3 text-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 placeholder-slate-500;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .form-input:focus {
            border-color: rgba(52, 211, 153, 0.5);
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.1);
        }
        .form-label { @apply block mb-2 font-semibold text-slate-300; }

        /* === 計時器圓環 === */
        .timer-ring {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .timer-ring svg {
            transform: rotate(-90deg);
            position: absolute;
        }
        .timer-ring-bg { stroke: rgba(71, 85, 105, 0.5); }
        .timer-ring-progress {
            stroke: url(#timerGradient);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        /* === 花園背景光暈 === */
        .garden-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: pulse-glow 4s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        .focus-mode .garden-glow {
            background: radial-gradient(circle, rgba(52, 211, 153, 0.25) 0%, transparent 70%);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* === 統計卡片 === */
        .stat-card {
            @apply p-5 rounded-xl text-center;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(148, 163, 184, 0.2);
        }
        .stat-value {
            @apply text-4xl font-bold mb-1;
            background: linear-gradient(135deg, var(--stat-color-1) 0%, var(--stat-color-2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* === 圖表容器 === */
        .chart-container {
            @apply p-5 rounded-xl;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        /* === 頁面標題 === */
        .page-title {
            @apply text-3xl font-bold text-center mb-6;
            background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* === 時間軸樣式 === */
        .timeline-slot {
            @apply flex items-center gap-3 py-2 px-3 rounded-lg transition-all duration-200;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }
        .timeline-slot:hover {
            background: rgba(51, 65, 85, 0.3);
        }
        .timeline-hour {
            @apply w-14 text-sm font-mono;
            color: #64748b;
        }
        .timeline-content {
            @apply flex-1 h-12 rounded-lg;
            background: rgba(71, 85, 105, 0.2);
            border: 1px dashed rgba(100, 116, 139, 0.3);
        }
    </style>
</head>
<body>

    <!-- SVG 漸層定義 -->
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#34d399"/>
                <stop offset="100%" stop-color="#10b981"/>
            </linearGradient>
        </defs>
    </svg>

    <main>
        <!-- 花園頁面 -->
        <div id="garden-page" class="text-center max-w-md mx-auto pt-6 relative">
            <!-- 設定按鈕 -->
            <div class="absolute top-4 right-4 z-10">
                <button id="settings-button" class="p-2 rounded-full bg-slate-800/50 backdrop-blur text-slate-400 hover:text-white hover:bg-slate-700/50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </button>
            </div>

            <!-- 專注任務顯示 -->
            <div id="focusing-task-display" class="h-10 text-center mb-2"></div>

            <!-- 植物容器（含背景光暈） -->
            <div class="relative mb-4 h-56 flex items-center justify-center">
                <div class="garden-glow"></div>
                <svg id="plant-svg" width="180" height="220" viewBox="0 0 200 240" class="relative z-10">
                    <g id="plant-base"><path d="M20 230 C 40 210, 160 210, 180 230 L 20 230 Z" fill="#5c3c20"/></g>
                    <g id="plant-body"></g>
                    <g id="plant-rare-feature"></g>
                </svg>
            </div>

            <!-- 植物名稱 -->
            <h2 id="plant-name" class="text-2xl font-bold text-emerald-300 mb-4"></h2>

            <!-- 計時器（含圓環進度） -->
            <div class="timer-ring mb-6">
                <svg width="200" height="200" viewBox="0 0 200 200">
                    <circle class="timer-ring-bg" cx="100" cy="100" r="90" fill="none" stroke-width="8"/>
                    <circle id="timer-ring-progress" class="timer-ring-progress" cx="100" cy="100" r="90" fill="none" stroke-width="8" stroke-dasharray="565.48" stroke-dashoffset="565.48"/>
                </svg>
                <div id="timer-display" class="text-6xl font-bold text-white" style="text-shadow: 0 0 30px rgba(52, 211, 153, 0.3);">25:00</div>
            </div>

            <!-- 線性進度條（備用） -->
            <div class="w-full bg-slate-700/50 rounded-full h-2 mb-6 overflow-hidden">
                <div id="progress-bar" class="h-2 rounded-full transition-all duration-300 ease-out" style="width: 0%; background: linear-gradient(90deg, #10b981 0%, #34d399 100%);"></div>
            </div>

            <!-- 控制按鈕 -->
            <div id="controls-container" class="space-y-4">
                <button id="main-action-button" class="btn-primary text-xl w-full">選擇任務以開始</button>
                <div id="secondary-controls" class="hidden grid grid-cols-2 gap-4">
                    <button id="pause-resume-button" class="btn-secondary py-3"><i class="gg-pause"></i><span class="ml-2">暫停</span></button>
                    <button id="give-up-button" class="btn-secondary btn-danger py-3"><i class="gg-close"></i><span class="ml-2">放棄</span></button>
                </div>
                <button id="distraction-button" class="hidden text-slate-400 hover:text-amber-400 text-sm py-2 transition-all hover:scale-105">😵‍💫 我分心了</button>
            </div>
        </div>
        
        <!-- 任務頁面 -->
        <div id="tasks-page" class="hidden max-w-2xl mx-auto pt-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="page-title mb-0">我的任務</h1>
                <button id="add-task-button" class="btn-primary py-2 px-5 text-base">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    新增任務
                </button>
            </div>
            <div id="tasks-list" class="space-y-3"></div>
        </div>

        <!-- 今日規劃頁面 -->
        <div id="planner-page" class="hidden max-w-4xl mx-auto pt-8">
            <h1 class="page-title">今日規劃</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 左欄：任務收件匣 -->
                <div class="glass-card p-5">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <span class="text-xl">📥</span> 待安排任務
                    </h2>
                    <div id="planner-inbox" class="space-y-2 min-h-[200px]"></div>
                </div>
                <!-- 右欄：時間軸 -->
                <div class="glass-card p-5">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <span class="text-xl">🕐</span> 今日時間軸
                    </h2>
                    <div id="planner-timeline" class="space-y-1 max-h-[400px] overflow-y-auto"></div>
                </div>
            </div>
        </div>

        <!-- 儀表板頁面 -->
        <div id="dashboard-page" class="hidden max-w-2xl mx-auto pt-8">
            <h1 class="page-title">我的儀表板</h1>

            <!-- 統計卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="stat-card" style="--stat-color-1: #fbbf24; --stat-color-2: #f59e0b;">
                    <div class="stat-value" id="stats-total-time">0</div>
                    <div class="text-sm text-slate-400">⏱️ 總專注時長 (分)</div>
                </div>
                <div class="stat-card" style="--stat-color-1: #22d3ee; --stat-color-2: #06b6d4;">
                    <div class="stat-value" id="stats-total-sessions">0</div>
                    <div class="text-sm text-slate-400">🍅 總專注次數</div>
                </div>
                <div class="stat-card" style="--stat-color-1: #fb7185; --stat-color-2: #f43f5e;">
                    <div class="stat-value" id="stats-longest-streak">0</div>
                    <div class="text-sm text-slate-400">🔥 最長連續專注天數</div>
                </div>
            </div>

            <!-- 專注活動圖表 -->
            <div class="chart-container mb-6">
                <h2 class="text-lg font-semibold mb-4 text-center flex items-center justify-center gap-2">
                    <span>📊</span> 最近一週專注活動
                </h2>
                <canvas id="focus-chart"></canvas>
            </div>

            <!-- 時間估算圖表 -->
            <div class="chart-container">
                <h2 class="text-lg font-semibold mb-4 text-center flex items-center justify-center gap-2">
                    <span>🎯</span> 時間估算準確度
                </h2>
                <canvas id="estimation-chart"></canvas>
            </div>
        </div>

        <!-- 成就頁面 -->
        <div id="achievements-page" class="hidden max-w-4xl mx-auto pt-8">
            <h1 class="page-title">我的成就</h1>
            <p class="text-center text-slate-400 mb-6">完成專注任務來解鎖徽章！</p>
            <div id="achievements-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>
    
    <!-- 現代浮動導航列 -->
    <nav class="sticky bottom-0 bottom-nav flex justify-around p-2 safe-area-pb" role="navigation" aria-label="主導航">
        <button data-page="dashboard-page" class="nav-item" aria-label="儀表板">
            <span class="text-xl mb-1">📊</span>
            <span class="text-xs">儀表板</span>
        </button>
        <button data-page="tasks-page" class="nav-item" aria-label="任務列表">
            <span class="text-xl mb-1">📝</span>
            <span class="text-xs">任務</span>
        </button>
        <button data-page="planner-page" class="nav-item" aria-label="今日規劃">
            <span class="text-xl mb-1">📅</span>
            <span class="text-xs">規劃</span>
        </button>
        <button data-page="garden-page" class="nav-item active" aria-label="心流花園" aria-current="page">
            <span class="text-xl mb-1">🌱</span>
            <span class="text-xs">花園</span>
        </button>
        <button data-page="achievements-page" class="nav-item" aria-label="成就徽章">
            <span class="text-xl mb-1">🏆</span>

    <div id="toast-notification"><span id="toast-text"></span></div>

    <script>
        const DOMElements = {
            mainActionButton: document.getElementById('main-action-button'),
            secondaryControls: document.getElementById('secondary-controls'),
            pauseResumeButton: document.getElementById('pause-resume-button'),
            giveUpButton: document.getElementById('give-up-button'),
            distractionButton: document.getElementById('distraction-button'),
            giveUpConfirmModal: document.getElementById('give-up-confirm-modal'),
            confirmGiveUp: document.getElementById('confirm-give-up'),
            cancelGiveUp: document.getElementById('cancel-give-up'),
            taskSelectionModal: document.getElementById('task-selection-modal'),
            taskSelectionList: document.getElementById('task-selection-list'),
            closeTaskSelectionButton: document.getElementById('close-task-selection-button'),
            focusingTaskDisplay: document.getElementById('focusing-task-display'),
            timerDisplay: document.getElementById('timer-display'),
            progressBar: document.getElementById('progress-bar'),
            plantName: document.getElementById('plant-name'),
            plantSvg: document.getElementById('plant-svg'),
            plantBody: document.getElementById('plant-body'),
            plantRareFeature: document.getElementById('plant-rare-feature'),
            pages: document.querySelectorAll('main > div'),
            navButtons: document.querySelectorAll('.nav-item'),
            tasksPage: document.getElementById('tasks-page'),
            addTaskButton: document.getElementById('add-task-button'),
            tasksList: document.getElementById('tasks-list'),
            taskModal: document.getElementById('task-modal'),
            closeTaskModalButton: document.getElementById('close-task-modal-button'),
            saveTaskButton: document.getElementById('save-task-button'),
            deleteTaskButton: document.getElementById('delete-task-button'),
            taskForm: document.getElementById('task-form'),
            taskModalTitle: document.getElementById('task-modal-title'),
            taskIdInput: document.getElementById('task-id-input'),
            taskNameInput: document.getElementById('task-name-input'),
            taskIconInput: document.getElementById('task-icon-input'),
            taskPomodorosInput: document.getElementById('task-pomodoros-input'),
            onboardingModal: document.getElementById('onboarding-modal'),
            onboardingForm: document.getElementById('onboarding-form'),
            plantNameInput: document.getElementById('plant-name-input'),
            settingsButton: document.getElementById('settings-button'),
            settingsModal: document.getElementById('settings-modal'),
            closeSettingsButton: document.getElementById('close-settings-button'),
            saveSettingsButton: document.getElementById('save-settings-button'),
            focusDurationInput: document.getElementById('focus-duration-input'),
            breakDurationInput: document.getElementById('break-duration-input'),
            dashboardPage: document.getElementById('dashboard-page'),
            achievementsPage: document.getElementById('achievements-page'),
            statsTotalTime: document.getElementById('stats-total-time'),
            statsTotalSessions: document.getElementById('stats-total-sessions'),
            statsLongestStreak: document.getElementById('stats-longest-streak'),
            focusChartCanvas: document.getElementById('focus-chart'),
            estimationChartCanvas: document.getElementById('estimation-chart'),
            achievementsGrid: document.getElementById('achievements-grid'),
            toast: document.getElementById('toast-notification'),
            toastText: document.getElementById('toast-text'),
            plannerPage: document.getElementById('planner-page'),
            plannerInbox: document.getElementById('planner-inbox'),
            plannerTimeline: document.getElementById('planner-timeline'),
            timerRingProgress: document.getElementById('timer-ring-progress'),
            gardenPage: document.getElementById('garden-page'),
        };

        let state = {};
        let focusChart = null;
        let estimationChart = null;
        function resetState() {
            state = {
                timer: { mode: 'idle', endTime: 0, timeLeftWhenPaused: 0, animationFrameId: null, totalDuration: 0 },
                currentTaskId: null,
                settings: { focusDuration: 25, breakDuration: 5 },
                plantName: '小綠',
                growthLevel: 0,
                rareFeature: null,
                tasks: [],
                focusHistory: [],
                achievements: [],
            };
        }
        const STORAGE_KEY = 'flowOSState_v3.3';
        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                console.error('Failed to save data:', e);
                showToast('儲存失敗，可能是儲存空間已滿');
            }
        }
        function loadData() {
            try {
                // Try to load v3.3 first, then fall back to v3.2 for migration
                let savedData = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (!savedData) {
                    savedData = JSON.parse(localStorage.getItem('flowOSState_v3.2'));
                    if (savedData) localStorage.removeItem('flowOSState_v3.2'); // Clean up old key
                }
                if (savedData) {
                    Object.assign(state, savedData);
                    if (!state.tasks) state.tasks = [];
                    if (!state.timer) state.timer = { mode: 'idle' };
                    if (!state.focusHistory) state.focusHistory = [];
                    if (!state.achievements) state.achievements = [];
                    return true;
                }
            } catch (e) {
                console.error('Failed to load data:', e);
            }
            return false;
        }

        const synth = new Tone.Synth().toDestination();
        const sounds = {
            success: () => synth.triggerAttackRelease("C5", "8n", Tone.now()),
            start: () => synth.triggerAttackRelease("C4", "8n", Tone.now()),
            giveUp: () => synth.triggerAttackRelease("F#3", "8n", Tone.now()),
            achievement: () => synth.triggerAttackRelease("G5", "4n", Tone.now()),
            save: () => synth.triggerAttackRelease("E5", "8n", Tone.now()),
            distraction: () => synth.triggerAttackRelease("D4", "8n", Tone.now()),
        };
        const plantStages=[
            `<path d="M100 210 L100 180" stroke="#73b865" stroke-width="4"/>`,
            `<path d="M100 210 L100 170" stroke="#73b865" stroke-width="5"/><path d="M100 180 C 80 170, 80 150, 100 140" stroke="#84cc76" stroke-width="4" fill="none"/>`,
            `<path d="M100 210 L100 160" stroke="#73b865" stroke-width="6"/><path d="M100 180 C 80 170, 80 150, 100 140" stroke="#84cc76" stroke-width="4" fill="none"/><path d="M100 175 C 120 165, 120 145, 100 135" stroke="#84cc76" stroke-width="4" fill="none"/>`,
            `<path d="M100 210 L100 140" stroke="#73b865" stroke-width="7"/><path d="M100 170 C 60 150, 60 120, 100 120" stroke="#84cc76" stroke-width="5" fill="none"/><path d="M100 165 C 140 145, 140 115, 100 115" stroke="#84cc76" stroke-width="5" fill="none"/>`,
            `<path d="M100 210 L100 135" stroke="#6a9a5f" stroke-width="8"/><path d="M100 170 C 60 150, 60 120, 100 120" stroke="#84cc76" stroke-width="5" fill="none"/><path d="M100 165 C 140 145, 140 115, 100 115" stroke="#84cc76" stroke-width="5" fill="none"/><circle cx="100" cy="105" r="15" fill="#fde047"/><circle cx="100" cy="105" r="8" fill="#fca5a5"/>`
        ];
        const rareFeaturesSVG = {
            'gold_flower': `<circle cx="130" cy="140" r="10" fill="gold" stroke="white" stroke-width="2"/>`,
            'blue_leaf': `<path d="M100 190 C 120 180, 120 160, 100 150" stroke="#3b82f6" stroke-width="4" fill="none"/>`,
            'crystal_fruit': `<circle cx="70" cy="150" r="12" fill="cyan" opacity="0.7"/>`
        };
        
        const ACHIEVEMENT_CONFIG = {
            focus_1: { title: "專注新手", desc: "完成第 1 次專注", icon: "🌱", check: s => s.growthLevel >= 1 },
            focus_10: { title: "專注達人", desc: "完成 10 次專注", icon: "🌳", check: s => s.growthLevel >= 10 },
            focus_50: { title: "專注大師", desc: "完成 50 次專注", icon: "🌲", check: s => s.growthLevel >= 50 },
            time_60: { title: "一小時成就", desc: "累計專注 60 分鐘", icon: "⏱️", check: s => calculateTotalFocusTime(s) >= 60 },
            time_600: { title: "十小時成就", desc: "累計專注 600 分鐘", icon: "🕰️", check: s => calculateTotalFocusTime(s) >= 600 },
            streak_3: { title: "好事成三", desc: "連續專注 3 天", icon: "🥉", check: s => calculateLongestStreak(s.focusHistory) >= 3 },
            streak_7: { title: "一週挑戰", desc: "連續專注 7 天", icon: "🥈", check: s => calculateLongestStreak(s.focusHistory) >= 7 },
            rare_1: { title: "稀有發現", desc: "發現第一個稀有特徵", icon: "💎", check: s => !!s.rareFeature },
        };

        function showToast(message) {
            DOMElements.toastText.textContent = message;
            DOMElements.toast.classList.add('show');
            setTimeout(() => DOMElements.toast.classList.remove('show'), 3000);
        }
        function checkAchievements() {
            Object.keys(ACHIEVEMENT_CONFIG).forEach(id => {
                if (!state.achievements.includes(id)) {
                    if (ACHIEVEMENT_CONFIG[id].check(state)) {
                        state.achievements.push(id);
                        showToast(`徽章已解鎖：${ACHIEVEMENT_CONFIG[id].title}`);
                        sounds.achievement();
                    }
                }
            });
        }
        function renderAchievements() {
            DOMElements.achievementsGrid.innerHTML = '';
            Object.keys(ACHIEVEMENT_CONFIG).forEach(id => {
                const config = ACHIEVEMENT_CONFIG[id];
                const unlocked = state.achievements.includes(id);
                const badge = document.createElement('div');
                badge.className = `achievement-badge ${unlocked ? 'unlocked' : 'locked'}`;
                badge.innerHTML = `<div class="achievement-icon">${config.icon}</div><h3 class="font-bold">${config.title}</h3><p class="text-xs text-gray-400">${config.desc}</p>`;
                DOMElements.achievementsGrid.appendChild(badge);
            });
        }
        function calculateTotalFocusTime(s) {
            if (!s.focusHistory) return 0;
            return s.focusHistory.reduce((sum, item) => sum + item.duration, 0);
        }
        function calculateLongestStreak(history) {
            if (!history || history.length === 0) return 0;
            const dates = [...new Set(history.map(item => item.date))].sort();
            if (dates.length === 0) return 0;
            let longestStreak = 1;
            let currentStreak = 1;
            for (let i = 1; i < dates.length; i++) {
                const currentDate = new Date(dates[i]);
                const prevDate = new Date(dates[i - 1]);
                const diffTime = currentDate - prevDate;
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays === 1) {
                    currentStreak++;
                } else {
                    longestStreak = Math.max(longestStreak, currentStreak);
                    currentStreak = 1;
                }
            }
            return Math.max(longestStreak, currentStreak);
        }
        function renderDashboard() {
            DOMElements.statsTotalTime.textContent = calculateTotalFocusTime(state);
            DOMElements.statsTotalSessions.textContent = state.growthLevel;
            DOMElements.statsLongestStreak.textContent = calculateLongestStreak(state.focusHistory);
            const last7Days = {};
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                last7Days[d.toISOString().split('T')[0]] = 0;
            }
            if(state.focusHistory) {
                state.focusHistory.forEach(item => {
                    if (last7Days[item.date] !== undefined) {
                        last7Days[item.date] += item.duration;
                    }
                });
            }
            const chartLabels = Object.keys(last7Days).map(d => d.substring(5));
            const chartData = Object.values(last7Days);
            if (focusChart) focusChart.destroy();
            focusChart = new Chart(DOMElements.focusChartCanvas, {
                type: 'bar',
                data: { labels: chartLabels, datasets: [{ label: '專注時長 (分鐘)', data: chartData, backgroundColor: 'rgba(52, 211, 153, 0.5)', borderColor: 'rgba(16, 185, 129, 1)', borderWidth: 1, borderRadius: 5 }] },
                options: { responsive: true, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { grid: { color: 'rgba(255,255,255,0.1)' } } }, plugins: { legend: { display: false } } }
            });
            renderEstimationChart();
        }
        function renderEstimationChart() {
            // 取得有預計番茄鐘的任務
            const tasksWithEstimates = state.tasks.filter(t => t.pomodorosEstimated > 0);
            if (tasksWithEstimates.length === 0) {
                if (estimationChart) {
                    estimationChart.destroy();
                    estimationChart = null;
                }
                return;
            }
            // 準備圖表資料
            const taskNames = tasksWithEstimates.map(t => t.name.length > 10 ? t.name.substring(0, 10) + '...' : t.name);
            const estimatedData = tasksWithEstimates.map(t => t.pomodorosEstimated);
            const actualData = tasksWithEstimates.map(t => t.pomodorosActual || 0);
            if (estimationChart) estimationChart.destroy();
            estimationChart = new Chart(DOMElements.estimationChartCanvas, {
                type: 'bar',
                data: {
                    labels: taskNames,
                    datasets: [
                        { label: '預計', data: estimatedData, backgroundColor: 'rgba(156, 163, 175, 0.5)', borderColor: 'rgba(107, 114, 128, 1)', borderWidth: 1, borderRadius: 5 },
                        { label: '實際', data: actualData, backgroundColor: 'rgba(251, 191, 36, 0.5)', borderColor: 'rgba(245, 158, 11, 1)', borderWidth: 1, borderRadius: 5 }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    scales: { x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { stepSize: 1 } }, y: { grid: { color: 'rgba(255,255,255,0.1)' } } },
                    plugins: { legend: { display: true, labels: { color: 'rgb(209, 213, 219)' } } }
                }
            });
        }
        function startTimer(mode, durationInSeconds) {
            if (state.timer.animationFrameId) cancelAnimationFrame(state.timer.animationFrameId);
            state.timer.mode = mode;
            state.timer.totalDuration = durationInSeconds * 1000;
            state.timer.endTime = Date.now() + state.timer.totalDuration;
            updateUIAfterStateChange();
            sounds.start();
            state.timer.animationFrameId = requestAnimationFrame(timerLoop);
        }
        function pauseTimer() {
            if (state.timer.mode !== 'focus' && state.timer.mode !== 'break') return;
            cancelAnimationFrame(state.timer.animationFrameId);
            state.timer.animationFrameId = null;
            state.timer.timeLeftWhenPaused = state.timer.endTime - Date.now();
            state.timer.mode = 'paused';
            updateUIAfterStateChange();
        }
        function resumeTimer() {
            if (state.timer.mode !== 'paused') return;
            state.timer.mode = state.currentTaskId ? 'focus' : 'break';
            state.timer.endTime = Date.now() + state.timer.timeLeftWhenPaused;
            state.timer.animationFrameId = requestAnimationFrame(timerLoop);
            updateUIAfterStateChange();
        }
        function giveUpTimer() { DOMElements.giveUpConfirmModal.classList.remove('hidden'); }
        function confirmGiveUpAction() {
            DOMElements.giveUpConfirmModal.classList.add('hidden');
            if (state.timer.animationFrameId) cancelAnimationFrame(state.timer.animationFrameId);
            sounds.giveUp();
            DOMElements.plantSvg.classList.add('plant-wilt');
            setTimeout(()=> DOMElements.plantSvg.classList.remove('plant-wilt'), 500);
            resetToIdleState();
        }
        function handleDistraction() {
            if (state.timer.mode !== 'focus') return;
            // 播放溫和音效
            sounds.distraction();
            // 植物短暫枯萎
            DOMElements.plantSvg.classList.add('plant-wilt');
            setTimeout(() => DOMElements.plantSvg.classList.remove('plant-wilt'), 500);
            // 進度倒退 5% (但不低於 0)
            const currentProgress = 1 - (state.timer.endTime - Date.now()) / state.timer.totalDuration;
            const newProgress = Math.max(0, currentProgress - 0.05);
            const newTimeLeft = state.timer.totalDuration * (1 - newProgress);
            state.timer.endTime = Date.now() + newTimeLeft;
            updateProgressBar(newProgress);
            // 鼓勵訊息
            showToast('沒關係，深呼吸，讓我們繼續吧！');
        }
        function timerLoop() {
            const timeLeft = state.timer.endTime - Date.now();
            if (timeLeft <= 0) {
                updateTimerDisplay(0);
                updateProgressBar(1);
                cancelAnimationFrame(state.timer.animationFrameId);
                state.timer.animationFrameId = null;
                handleTimerEnd();
                return;
            }
            updateTimerDisplay(timeLeft);
            updateProgressBar(1 - timeLeft / state.timer.totalDuration);
            state.timer.animationFrameId = requestAnimationFrame(timerLoop);
        }
        function handleTimerEnd() {
            sounds.success();
            if (state.timer.mode === 'focus') {
                const task = state.tasks.find(t => t.id === state.currentTaskId);
                if (task) task.pomodorosActual = (task.pomodorosActual || 0) + 1;
                state.growthLevel++;
                const today = new Date().toISOString().split('T')[0];
                state.focusHistory.push({ date: today, duration: state.settings.focusDuration });
                if (Math.random() < 0.2 && !state.rareFeature) {
                    const rareKeys = Object.keys(rareFeaturesSVG);
                    state.rareFeature = rareKeys[Math.floor(Math.random() * rareKeys.length)];
                }
                checkAchievements();
                saveData();
                showToast('🎉 專注完成！休息一下吧');
                startTimer('break', state.settings.breakDuration * 60);
            } else if (state.timer.mode === 'break') {
                showToast('☕ 休息結束！準備好繼續了嗎？');
                // 嘗試發送瀏覽器通知
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('心流OS', { body: '休息結束！準備好繼續專注了嗎？', icon: 'https://raw.githubusercontent.com/thc1006/Flow-OS/main/images/demo.png' });
                }
                resetToIdleState();
            }
        }
        function resetToIdleState() {
            state.timer.mode = 'idle';
            state.currentTaskId = null;
            if(state.timer.animationFrameId) cancelAnimationFrame(state.timer.animationFrameId);
            state.timer.animationFrameId = null;
            updateUIAfterStateChange();
            saveData();
        }
        function updateUIAfterStateChange() {
            const { mode } = state.timer;
            DOMElements.mainActionButton.classList.toggle('hidden', mode !== 'idle');
            if(mode === 'idle') {
                DOMElements.mainActionButton.disabled = false;
                DOMElements.mainActionButton.textContent = state.currentTaskId ? '開始專注' : '選擇任務以開始';
            }
            DOMElements.secondaryControls.classList.toggle('hidden', mode === 'idle');
            if(mode === 'break') DOMElements.secondaryControls.classList.add('hidden');
            // 分心按鈕只在專注模式顯示
            DOMElements.distractionButton.classList.toggle('hidden', mode !== 'focus');

            if (mode === 'focus' || mode === 'break') {
                DOMElements.pauseResumeButton.innerHTML = `<i class="gg-pause"></i><span class="ml-2">暫停</span>`;
            } else if (mode === 'paused') {
                DOMElements.pauseResumeButton.innerHTML = `<i class="gg-play"></i><span class="ml-2">繼續</span>`;
            }
            DOMElements.plantSvg.classList.toggle('plant-paused', mode === 'paused');
            if (mode === 'idle') {
                updateTimerDisplay(state.settings.focusDuration * 60 * 1000);
                updateProgressBar(0);
            }
            updateFocusingTaskDisplay();
            updatePlantVisuals();
        }
        const originalTitle = document.title;
        function updateTimerDisplay(ms) {
            const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const timeStr = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            DOMElements.timerDisplay.textContent = timeStr;
            // 更新瀏覽器標籤頁標題
            if (state.timer.mode === 'focus') {
                document.title = `🍅 ${timeStr} | 專注中 - 心流OS`;
            } else if (state.timer.mode === 'break') {
                document.title = `☕ ${timeStr} | 休息中 - 心流OS`;
            } else if (state.timer.mode === 'paused') {
                document.title = `⏸️ ${timeStr} | 已暫停 - 心流OS`;
            } else {
                document.title = originalTitle;
            }
        }
        function updateProgressBar(progress) {
            // 更新線性進度條
            DOMElements.progressBar.style.width = `${progress * 100}%`;
            // 更新圓環進度條 (圓周長 = 2 * π * r = 2 * 3.14159 * 90 ≈ 565.48)
            const circumference = 565.48;
            const offset = circumference * (1 - progress);
            if (DOMElements.timerRingProgress) {
                DOMElements.timerRingProgress.style.strokeDashoffset = offset;
            }
        }
        function updateFocusingTaskDisplay() {
            if (state.currentTaskId && state.timer.mode !== 'idle') {
                const task = state.tasks.find(t => t.id === state.currentTaskId);
                if (task) {
                    DOMElements.focusingTaskDisplay.innerHTML = `<p class="text-slate-400 text-sm">專注於: <span class="font-semibold text-emerald-300">${task.icon || '🎯'} ${task.name}</span></p>`;
                }
            } else {
                DOMElements.focusingTaskDisplay.innerHTML = '';
            }
            // 更新花園頁面的專注模式視覺
            if (DOMElements.gardenPage) {
                DOMElements.gardenPage.classList.toggle('focus-mode', state.timer.mode === 'focus');
            }
        }
        function updatePlantVisuals(){
            DOMElements.plantName.textContent = state.plantName;
            const stageIndex = Math.min(Math.floor(state.growthLevel / 2), plantStages.length - 1);
            DOMElements.plantBody.innerHTML = plantStages[stageIndex] || plantStages[0];
            DOMElements.plantRareFeature.innerHTML = state.rareFeature ? rareFeaturesSVG[state.rareFeature] : '';
            DOMElements.plantSvg.classList.toggle('plant-grow', state.timer.mode === 'focus');
            // 植物縮放隨等級成長，但設上限避免超出容器
            const plantScale = Math.min(1 + state.growthLevel * 0.01, 1.8);
            DOMElements.plantSvg.style.transform = `scale(${plantScale})`;
        }
        function openTaskSelectionModal() {
            DOMElements.taskSelectionList.innerHTML = '';
            const incompleteTasks = state.tasks.filter(t => !(t.pomodorosEstimated > 0 && t.pomodorosActual >= t.pomodorosEstimated));
            if (incompleteTasks.length === 0) {
                 DOMElements.taskSelectionList.innerHTML = `<p class="p-4 text-center text-gray-400">太棒了，沒有未完成的任務！<br>請先到「任務」頁面新增一個吧！</p>`;
            } else {
                incompleteTasks.forEach(task => {
                    const taskEl = document.createElement('button');
                    taskEl.className = 'task-selection-item';
                    taskEl.dataset.taskId = task.id;
                    taskEl.innerHTML = `<span class="text-lg font-semibold">${task.icon || '🎯'} ${task.name}</span>`;
                    DOMElements.taskSelectionList.appendChild(taskEl);
                });
            }
            DOMElements.taskSelectionModal.classList.remove('hidden');
        }
        function selectTaskForFocus(taskId) {
            state.currentTaskId = taskId;
            DOMElements.taskSelectionModal.classList.add('hidden');
            updateUIAfterStateChange();
        }
        function openTaskModal(task = null) {
            DOMElements.taskForm.reset();
            if (task) {
                DOMElements.taskModalTitle.textContent = "編輯任務";
                DOMElements.taskIdInput.value = task.id;
                DOMElements.taskNameInput.value = task.name;
                DOMElements.taskIconInput.value = task.icon;
                DOMElements.taskPomodorosInput.value = task.pomodorosEstimated;
                DOMElements.deleteTaskButton.classList.remove('hidden');
            } else {
                DOMElements.taskModalTitle.textContent = "新增任務";
                DOMElements.taskIdInput.value = '';
                DOMElements.deleteTaskButton.classList.add('hidden');
            }
            DOMElements.taskModal.classList.remove('hidden');
        }
        function saveTask() {
            const id = DOMElements.taskIdInput.value;
            const name = DOMElements.taskNameInput.value.trim();
            if (!name) return;
            const icon = DOMElements.taskIconInput.value.trim();
            const pomodorosEstimated = parseInt(DOMElements.taskPomodorosInput.value, 10);
            if (id) {
                const task = state.tasks.find(t => t.id === id);
                if(task) Object.assign(task, { name, icon, pomodorosEstimated });
            } else {
                state.tasks.push({ id: `t_${Date.now()}`, name, icon, pomodorosEstimated, pomodorosActual: 0 });
            }
            saveData();
            renderTasksPage();
            DOMElements.taskModal.classList.add('hidden');
        }
        function deleteTask() {
            const id = DOMElements.taskIdInput.value;
            if(state.currentTaskId === id) resetToIdleState();
            state.tasks = state.tasks.filter(t => t.id !== id);
            saveData();
            renderTasksPage();
            DOMElements.taskModal.classList.add('hidden');
        }
        function renderTasksPage() {
            DOMElements.tasksList.innerHTML = '';
            if (state.tasks.length === 0) {
                DOMElements.tasksList.innerHTML = `
                    <div class="glass-card text-center py-12 px-6">
                        <div class="text-6xl mb-4">🌱</div>
                        <p class="text-lg mb-2 text-slate-200">還沒有任何任務</p>
                        <p class="text-sm mb-4 text-slate-400">點擊上方「新增任務」按鈕開始你的專注之旅！</p>
                        <p class="text-xs text-slate-500">提示：按 <kbd class="bg-slate-700/50 px-2 py-1 rounded text-slate-300">Space</kbd> 快速開始/暫停計時</p>
                    </div>`;
                return;
            }
            state.tasks.forEach(task => {
                const taskEl = document.createElement('div');
                taskEl.className = 'task-item';
                taskEl.dataset.taskId = task.id;
                const tomatoes = Array(task.pomodorosActual || 0).fill('🍅').join('');
                const estimatedTomatoes = Array(task.pomodorosEstimated || 0).fill('⚪').join('');
                taskEl.innerHTML = `
                    <div class="flex-grow flex items-center gap-4">
                        <span class="text-3xl">${task.icon || '🎯'}</span>
                        <div>
                            <span class="text-lg font-semibold text-slate-100">${task.name}</span>
                            <div class="task-pomodoro-display">
                                <span class="actual">${tomatoes}</span>
                                <span class="estimated">${estimatedTomatoes.substring(tomatoes.length)}</span>
                            </div>
                        </div>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>`;
                DOMElements.tasksList.appendChild(taskEl);
            });
        }

        // 渲染今日規劃頁面
        function renderPlannerPage() {
            // 清空左欄：顯示所有未完成任務
            DOMElements.plannerInbox.innerHTML = '';
            const incompleteTasks = state.tasks.filter(t => !(t.pomodorosEstimated > 0 && t.pomodorosActual >= t.pomodorosEstimated));

            if (incompleteTasks.length === 0) {
                DOMElements.plannerInbox.innerHTML = `
                    <div class="text-center py-8 text-slate-400">
                        <div class="text-4xl mb-3">🌱</div>
                        <p class="text-slate-300">還沒有任務</p>
                        <p class="text-sm">先到任務頁面新增吧！</p>
                    </div>`;
            } else {
                incompleteTasks.forEach(task => {
                    const taskCard = document.createElement('div');
                    taskCard.className = 'p-3 rounded-lg bg-slate-700/30 hover:bg-slate-700/50 transition-all cursor-pointer border border-slate-600/30 hover:border-emerald-500/30';
                    taskCard.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${task.icon || '🎯'}</span>
                            <div class="flex-1 min-w-0">
                                <div class="font-semibold text-slate-200 truncate">${task.name}</div>
                                <div class="text-xs text-slate-400">${task.pomodorosEstimated || 0} 🍅 預計</div>
                            </div>
                        </div>`;
                    DOMElements.plannerInbox.appendChild(taskCard);
                });
            }

            // 清空右欄：生成 7:00 - 23:00 的時間軸（每小時一格）
            DOMElements.plannerTimeline.innerHTML = '';
            const currentHour = new Date().getHours();
            for (let hour = 7; hour <= 23; hour++) {
                const timeSlot = document.createElement('div');
                const isCurrentHour = hour === currentHour;
                timeSlot.className = `timeline-slot ${isCurrentHour ? 'bg-emerald-500/10 border-l-2 border-l-emerald-500' : ''}`;
                timeSlot.innerHTML = `
                    <div class="timeline-hour ${isCurrentHour ? 'text-emerald-400 font-semibold' : ''}">${String(hour).padStart(2, '0')}:00</div>
                    <div class="timeline-content ${isCurrentHour ? 'border-emerald-500/30' : ''}"></div>`;
                DOMElements.plannerTimeline.appendChild(timeSlot);
            }
        }

        function switchPage(pageId) {
            document.querySelectorAll('main > div').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            DOMElements.navButtons.forEach(b => b.classList.toggle('active', b.dataset.page === pageId));
            if (pageId === 'tasks-page') renderTasksPage();
            if (pageId === 'dashboard-page') renderDashboard();
            if (pageId === 'achievements-page') renderAchievements();
            if (pageId === 'planner-page') renderPlannerPage();
        }
        function setupEventListeners() {
            DOMElements.mainActionButton.addEventListener('click', () => {
                if (state.timer.mode === 'idle') {
                    if (!state.currentTaskId) openTaskSelectionModal();
                    else startTimer('focus', state.settings.focusDuration * 60);
                }
            });
            DOMElements.pauseResumeButton.addEventListener('click', () => {
                if (state.timer.mode === 'focus' || state.timer.mode === 'break') pauseTimer();
                else if (state.timer.mode === 'paused') resumeTimer();
            });
            DOMElements.giveUpButton.addEventListener('click', giveUpTimer);
            DOMElements.distractionButton.addEventListener('click', handleDistraction);
            DOMElements.confirmGiveUp.addEventListener('click', confirmGiveUpAction);
            DOMElements.cancelGiveUp.addEventListener('click', () => DOMElements.giveUpConfirmModal.classList.add('hidden'));
            DOMElements.closeTaskSelectionButton.addEventListener('click', () => DOMElements.taskSelectionModal.classList.add('hidden'));
            DOMElements.taskSelectionList.addEventListener('click', e => {
                const taskItem = e.target.closest('.task-selection-item');
                if (taskItem) selectTaskForFocus(taskItem.dataset.taskId);
            });
            DOMElements.navButtons.forEach(b => b.addEventListener('click', () => switchPage(b.dataset.page)));
            DOMElements.addTaskButton.addEventListener('click', () => openTaskModal());
            DOMElements.tasksList.addEventListener('click', e => {
                const taskItem = e.target.closest('.task-item');
                if (taskItem) openTaskModal(state.tasks.find(t => t.id === taskItem.dataset.taskId));
            });
            DOMElements.saveTaskButton.addEventListener('click', saveTask);
            DOMElements.deleteTaskButton.addEventListener('click', deleteTask);
            DOMElements.closeTaskModalButton.addEventListener('click', () => DOMElements.taskModal.classList.add('hidden'));
            DOMElements.onboardingForm.addEventListener('submit', e => {
                e.preventDefault();
                state.plantName = DOMElements.plantNameInput.value.trim() || '小綠';
                DOMElements.onboardingModal.classList.add('hidden');
                updatePlantVisuals();
                saveData();
            });
            DOMElements.settingsButton.addEventListener('click', () => {
                DOMElements.focusDurationInput.value = state.settings.focusDuration;
                DOMElements.breakDurationInput.value = state.settings.breakDuration;
                DOMElements.settingsModal.classList.remove('hidden');
            });
            DOMElements.closeSettingsButton.addEventListener('click', () => DOMElements.settingsModal.classList.add('hidden'));
            DOMElements.saveSettingsButton.addEventListener('click', () => {
                const focusVal = parseInt(DOMElements.focusDurationInput.value, 10);
                const breakVal = parseInt(DOMElements.breakDurationInput.value, 10);
                if (isNaN(focusVal) || focusVal < 1 || focusVal > 180) {
                    showToast('專注時間需在 1-180 分鐘之間');
                    return;
                }
                if (isNaN(breakVal) || breakVal < 1 || breakVal > 60) {
                    showToast('休息時間需在 1-60 分鐘之間');
                    return;
                }
                state.settings.focusDuration = focusVal;
                state.settings.breakDuration = breakVal;
                if(state.timer.mode === 'idle') resetToIdleState();
                DOMElements.settingsModal.classList.add('hidden');
                sounds.save();
                saveData();
            });
            // 鍵盤快捷鍵
            document.addEventListener('keydown', (e) => {
                // Escape 關閉所有 Modal
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(modal => {
                        modal.classList.add('hidden');
                    });
                }
                // Space 開始/暫停/繼續 (僅在花園頁面且無 Modal 開啟時)
                if (e.key === ' ' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    const anyModalOpen = document.querySelector('.modal-overlay:not(.hidden)');
                    if (anyModalOpen) return;
                    e.preventDefault();
                    if (state.timer.mode === 'idle' && state.currentTaskId) {
                        startTimer('focus', state.settings.focusDuration * 60);
                    } else if (state.timer.mode === 'focus' || state.timer.mode === 'break') {
                        pauseTimer();
                    } else if (state.timer.mode === 'paused') {
                        resumeTimer();
                    }
                }
            });
            // Modal 點擊背景關閉
            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.add('hidden');
                    }
                });
            });
        }
        
        function init() {
            resetState();
            if(!loadData()) {
                DOMElements.onboardingModal.classList.remove('hidden');
            }
            setupEventListeners();
            resetToIdleState();
            switchPage('garden-page');
            // 請求瀏覽器通知權限
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
        init();
    </script>
</body>
</html>
